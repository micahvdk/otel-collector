receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Aggregation processor - aggregates metrics by user email over time windows
  # Groups metrics by user.email attribute and sums values within each time window
  aggregation:
    attribute_key: "user.email"        # Group by user email
    aggregation_interval: 1h
    emit_interval: 10m

  # Batch processor - batches aggregated metrics before sending
  batch:
    timeout: 3600s             # 1 hour
    send_batch_size: 20000      # Send early if batch reaches 20k metrics (safety valve)
    send_batch_max_size: 25000  # Hard limit 

exporters:
  otlphttp/integration:
    endpoint: ${env:MULTITUDES_INTEGRATION_ENDPOINT}
    encoding: json
    headers:
      Authorization: "Bearer ${env:MULTITUDES_INTEGRATION_TOKEN}"
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

extensions:
  health_check:
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, aggregation, batch]
      exporters: [otlphttp/integration]
