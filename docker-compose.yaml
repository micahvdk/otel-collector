services:
  otel-collector:
    # Use custom collector with aggregation processor
    # Build with: docker build -t otelcol-multitudes:latest .
    image: otelcol-multitudes:latest
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:55679:55679" # zPages diagnostics
      - "127.0.0.1:13133:13133" # Health check
    volumes:
      - ~/.aws:/root/.aws:ro  # AWS credentials for SSM access (optional)
    environment:
      - MULTITUDES_INTEGRATION_TOKEN=${MULTITUDES_INTEGRATION_TOKEN}
      - MULTITUDES_INTEGRATION_ENDPOINT=${MULTITUDES_INTEGRATION_ENDPOINT:-https://integrations.multitudes.co/ai/otel}
      # Enable debug logging (set DEBUG=true to enable)
      - DEBUG=${DEBUG:-}
    command: ["--config=/etc/otelcol-contrib/otel-collector-config.yaml"]
